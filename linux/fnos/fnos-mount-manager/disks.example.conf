# FNOS 磁盘挂载示例配置。
# 复制为 disks.local.conf 后，将占位符替换为当前机器的真实卷标或 UUID。

# 配置默认挂载根目录，所有相对挂载点都会拼到这个目录下。
mount_root "/vol00"

# 配置所有磁盘共用的默认文件系统类型。
default_fs "ntfs"

# 配置默认挂载模式。
# 支持: automount, eager
default_mode "automount"

# 配置所有磁盘共用的默认挂载选项。
default_options "nofail,uid=1000,gid=1000,umask=022,iocharset=utf8,windows_names,big_writes"

# 配置 systemd 等待设备就绪的默认超时秒数。
default_device_timeout "60"

# 使用 LABEL 作为主标识时，更容易复制到其他机器。
disk "bookDisk" "LABEL:book"

# 使用 UUID 作为主标识时，更适合卷标不稳定或无法统一的磁盘。
disk "debutDisk" "UUID:REPLACE_WITH_DEBUT_UUID" mode=eager
disk "RemovableDisk" "UUID:REPLACE_WITH_REMOVABLE_UUID"
