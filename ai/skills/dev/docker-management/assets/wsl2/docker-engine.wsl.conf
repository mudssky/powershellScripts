# WSL 发行版内配置模板。
# 部署方式：复制到目标发行版的 /etc/wsl.conf，然后在 Windows 侧执行 wsl --shutdown。

[boot]
# Docker Engine 依赖 systemd 管理 dockerd/containerd 服务。
systemd=true

[automount]
# 以下开关为 WSL 当前默认值；需要排查挂载问题时再取消注释显式覆盖。
# enabled=true
# root=/mnt/
# 遇到 /mnt/c 等 Windows 盘内脚本执行位或 bind mount 权限问题时，再启用 DrvFs 元数据。
# options="metadata,umask=022,fmask=011"
# mountFsTab=true

[interop]
# 以下开关为 WSL 当前默认值；需要隔离 Windows 互操作时再取消注释并改为 false。
# enabled=true
# appendWindowsPath=true
