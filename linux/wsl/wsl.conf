# WSL 发行版内配置模板。
# 本文件由 Linux 客体流水线部署；生效需要在 Windows 宿主执行 wsl --shutdown。

[boot]
# 客体 Docker Engine 依赖 systemd 管理 dockerd/containerd 服务。
systemd=true

[automount]
enabled=true
root=/mnt/
# metadata 让 DrvFs 记录 Linux 权限；umask/fmask 保持脚本可执行和默认可读语义。
options="metadata,umask=022,fmask=011"
mountFsTab=true

[interop]
enabled=true
appendWindowsPath=true
