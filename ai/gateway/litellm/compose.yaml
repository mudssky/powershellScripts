services:
  litellm:
    container_name: litellm
    image: ${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-latest}
    restart: unless-stopped
    ports:
      - "${LITELLM_HOST_PORT:-34000}:4000"
    environment:
      # 固定容器常量保留在 compose 内部，避免每个环境都重复维护这类不变值。
      # LiteLLM 官方镜像会把 PORT 透传给内部 uvicorn 启动参数，未显式设置时会报错。
      PORT: "4000"
      # 当前镜像需要显式提供配置文件路径；仅挂载 /app/config.yaml 并不会自动加载 model_list。
      CONFIG_FILE_PATH: "/app/config.yaml"
      # 下面这些值统一由 `--env-file .env.local` 提供，再通过白名单方式注入容器。
      # 这样可以避免把 `.env.local` 中与 LiteLLM 无关的变量一并注入容器。
      # 通过 compose 插值保留当前默认数据库地址；start.ps1 会在存在 .env.local 时传入 --env-file 以支持本地覆盖。
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:12345678@host.docker.internal:5432/litellm}
      # 当前本地配置同时走 NewAPI 与智谱 OpenAI 兼容接口；变量必须显式注入容器，LiteLLM 才能解析 os.environ/...。
      NEWAPI_API_BASE: ${NEWAPI_API_BASE:-}
      NEWAPI_KEY: ${NEWAPI_KEY:-}
      # Claude 优先走专用 Anthropic 兼容上游；若未单独配置，则自动复用通用 NewAPI 地址。
      NEWAPI_ANTHROPIC_API_BASE: ${NEWAPI_ANTHROPIC_API_BASE:-${NEWAPI_API_BASE:-}}
      NEWAPI_ANTHROPIC_KEY: ${NEWAPI_ANTHROPIC_KEY:-${NEWAPI_KEY:-}}
      # 某些 Anthropic 兼容网关已自带完整路径时，可通过这个开关禁止 LiteLLM 自动补后缀。
      LITELLM_ANTHROPIC_DISABLE_URL_SUFFIX: ${LITELLM_ANTHROPIC_DISABLE_URL_SUFFIX:-}
      # 智谱 GLM Coding Plan 走独立 OpenAI 兼容端点，默认指向官方专属地址。
      Z_AI_CODING_API_BASE: ${Z_AI_CODING_API_BASE:-https://open.bigmodel.cn/api/coding/paas/v4}
      Z_AI_API_KEY: ${Z_AI_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      # 保留旧变量，避免切回 qwen.yaml 等历史配置时还要额外补环境变量。
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_BASE: ${DASHSCOPE_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    volumes:
      - ./litellm.local.yaml:/app/config.yaml:ro
    extra_hosts:
      # 在 Linux Docker Engine 场景补齐宿主机别名，保持默认 DATABASE_URL 可用。
      - "host.docker.internal:host-gateway"
