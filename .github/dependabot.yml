version: 2
updates:
  # 单独维护 GitHub Actions，避免 CI 依赖和应用依赖混在同一轮 review。
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  # 维护主 pnpm monorepo：根目录、workspace 包和 Node 工具脚本。
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/projects/**"
      - "/scripts/node"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    groups:
      # 将非破坏性更新按依赖名归并，减少 monorepo 多目录重复 PR。
      non-breaking:
        group-by: "dependency-name"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # major 更新继续可见，但等版本稳定一段时间后再提 PR。
    cooldown:
      semver-major-days: 60
    ignore:
      # 该预览包更新节奏过快，继续手工控制升级窗口。
      - dependency-name: "@typescript/native-preview"
        versions:
          - "*"

  # 低频维护独立的 mpv Scripts TypeScript 项目。
  # 注意：该目录当前同时存在 pnpm-lock.yaml 和 package-lock.json，
  # 首次 Dependabot PR 需要确认实际 lockfile 变更形态。
  - package-ecosystem: "npm"
    directory: "/config/software/mpv/mpv_scripts"
    schedule:
      interval: "quarterly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    groups:
      non-breaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      semver-major-days: 90
